name: yogya_app
description: YOGYA - Intelligent Exam Eligibility & Tracking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.0
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  fl_chart: ^0.68.0
  timeline_tile: ^2.0.0

  # OCR
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  image_cropper: ^12.2.0
  file_picker: ^8.0.3

  # Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Network
  dio: ^5.4.3
  path: ^1.9.0

  # Utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  image: ^4.8.0
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1 
  build_runner: ^2.4.8 
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/yogya_logo_1024.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/yogya_logo_1024.png"
  windows:
    generate: true
    image_path: "assets/images/yogya_logo_1024.png"
    icon_size: 48
